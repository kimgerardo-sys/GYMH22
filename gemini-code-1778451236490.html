<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>H22 Gym Manager</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkgyMiBHeW0gTWFuYWdlciIsCiAgInNob3J0X25hbWUiOiAiSDIyIEd5bSIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjMGYxNzJhIiwKICAidGhlbWVfY29sb3IiOiAiIzI1NjNlYiIKfQ==">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <header class="glass sticky top-0 z-50 border-b border-slate-200 px-6 py-4 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold tracking-tighter text-slate-900">H22 <span class="text-blue-600">GYM</span></h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Entrenamiento Personalizado</p>
        </div>
        <div id="status-indicator" class="h-2 w-2 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]"></div>
    </header>

    <main id="app-content" class="p-4 pb-32">
        
        <div id="view-classes" class="space-y-6">
            <header>
                <p class="text-sm text-slate-500 capitalize" id="current-date"></p>
                <h2 class="text-2xl font-bold">Horarios de Clase</h2>
            </header>
            <div id="schedule-list" class="grid gap-3">
                </div>
        </div>

        <div id="view-admin" class="hidden space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-bold">Panel de Socios</h2>
                <button onclick="addUser()" class="bg-blue-600 text-white p-2 rounded-xl shadow-lg">
                    <i data-lucide="plus" class="w-6 h-6"></i>
                </button>
            </div>
            <div id="user-list" class="grid gap-3">
                </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 glass border-t border-slate-200 flex justify-around items-center py-3 safe-area-bottom z-50">
        <button onclick="switchTab('classes')" id="btn-classes" class="flex flex-col items-center gap-1 text-blue-600">
            <i data-lucide="calendar" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold uppercase">Clases</span>
        </button>
        <button onclick="switchTab('admin')" id="btn-admin" class="flex flex-col items-center gap-1 text-slate-400">
            <i data-lucide="users" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold uppercase">Socios</span>
        </button>
    </nav>

    <script>
        // --- CONFIGURACIÓN ---
        const WHATSAPP_NUMBER = "521234567890"; // Reemplaza con tu número (código país + número)
        const MAX_CAPACITY = 6;
        const CLASS_HOURS = ["07:00", "08:00", "09:00", "10:00", "17:00", "18:00", "19:00", "20:00"];

        // --- BASE DE DATOS LOCAL ---
        let users = JSON.parse(localStorage.getItem('H22_Users')) || [];
        let bookings = JSON.parse(localStorage.getItem('H22_Bookings')) || {};

        // Inicializar
        document.addEventListener('DOMContentLoaded', () => {
            renderSchedule();
            renderUsers();
            updateDate();
            lucide.createIcons();
        });

        function updateDate() {
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('es-ES', options);
        }

        // --- LÓGICA DE NAVEGACIÓN ---
        function switchTab(view) {
            document.getElementById('view-classes').classList.toggle('hidden', view !== 'classes');
            document.getElementById('view-admin').classList.toggle('hidden', view !== 'admin');
            
            document.getElementById('btn-classes').className = view === 'classes' ? 'flex flex-col items-center gap-1 text-blue-600' : 'flex flex-col items-center gap-1 text-slate-400';
            document.getElementById('btn-admin').className = view === 'admin' ? 'flex flex-col items-center gap-1 text-blue-600' : 'flex flex-col items-center gap-1 text-slate-400';
            
            if(view === 'classes') renderSchedule();
            if(view === 'admin') renderUsers();
        }

        // --- GESTIÓN DE SOCIOS ---
        function renderUsers() {
            const container = document.getElementById('user-list');
            container.innerHTML = users.length === 0 ? '<p class="text-center text-slate-400 py-10">No hay socios registrados</p>' : '';
            
            users.forEach((user, index) => {
                const expiry = new Date(user.expiryDate);
                const today = new Date();
                const diffTime = expiry - today;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                
                let colorClass = "text-emerald-600 bg-emerald-50";
                let statusText = `Vence en ${diffDays} días`;

                if (diffDays <= 0) {
                    colorClass = "text-red-600 bg-red-50 font-bold";
                    statusText = "MENSUALIDAD VENCIDA";
                } else if (diffDays <= 3) {
                    colorClass = "text-amber-600 bg-amber-50";
                    statusText = "Próximo a vencer";
                }

                container.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex justify-between items-center">
                        <div>
                            <h3 class="font-bold text-slate-800">${user.name}</h3>
                            <p class="text-[11px] ${colorClass} inline-block px-2 py-0.5 rounded-full mt-1">${statusText}</p>
                        </div>
                        <button onclick="deleteUser(${index})" class="text-slate-300 hover:text-red-500">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        async function addUser() {
            const { value: formValues } = await Swal.fire({
                title: 'Registrar Socio',
                html:
                    '<input id="sw-name" class="swal2-input" placeholder="Nombre">' +
                    '<label class="text-xs text-slate-400 block mt-4 text-left px-10">Fecha de pago/vencimiento:</label>' +
                    '<input id="sw-date" type="date" class="swal2-input">',
                confirmButtonText: 'Guardar',
                focusConfirm: false,
                preConfirm: () => {
                    return {
                        name: document.getElementById('sw-name').value,
                        expiryDate: document.getElementById('sw-date').value
                    }
                }
            });

            if (formValues && formValues.name) {
                users.push(formValues);
                localStorage.setItem('H22_Users', JSON.stringify(users));
                renderUsers();
            }
        }

        function deleteUser(index) {
            users.splice(index, 1);
            localStorage.setItem('H22_Users', JSON.stringify(users));
            renderUsers();
        }

        // --- GESTIÓN DE CLASES ---
        function renderSchedule() {
            const container = document.getElementById('schedule-list');
            container.innerHTML = '';

            CLASS_HOURS.forEach(hour => {
                const list = bookings[hour] || [];
                const isFull = list.length >= MAX_CAPACITY;
                
                container.innerHTML += `
                    <div onclick="openBooking('${hour}')" class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex justify-between items-center active:scale-[0.98] transition-transform">
                        <div class="flex items-center gap-4">
                            <div class="bg-slate-900 text-white w-14 h-14 rounded-xl flex items-center justify-center font-bold text-lg">
                                ${hour.split(':')[0]}
                            </div>
                            <div>
                                <h3 class="font-bold">Clase H22</h3>
                                <p class="text-xs text-slate-500">${MAX_CAPACITY - list.length} cupos disponibles</p>
                            </div>
                        </div>
                        <div class="flex -space-x-2">
                            ${list.slice(0, 3).map(() => `<div class="w-6 h-6 rounded-full bg-blue-100 border-2 border-white"></div>`).join('')}
                            ${list.length > 3 ? `<div class="text-[10px] bg-slate-100 w-6 h-6 rounded-full flex items-center justify-center border-2 border-white">+${list.length - 3}</div>` : ''}
                        </div>
                    </div>
                `;
            });
        }

        function openBooking(hour) {
            const list = bookings[hour] || [];
            
            Swal.fire({
                title: `Clase ${hour}`,
                text: 'Selecciona tu nombre para reservar o cancelar:',
                input: 'select',
                inputOptions: users.reduce((acc, user) => ({ ...acc, [user.name]: user.name }), {}),
                showDenyButton: true,
                showCancelButton: true,
                confirmButtonText: 'Reservar',
                denyButtonText: 'Cancelar Reserva',
                confirmButtonColor: '#2563eb',
            }).then((result) => {
                if (result.isConfirmed) {
                    const userName = result.value;
                    if (list.includes(userName)) return Swal.fire('Ya estás anotado');
                    if (list.length >= MAX_CAPACITY) return Swal.fire('Clase llena');
                    
                    if(!bookings[hour]) bookings[hour] = [];
                    bookings[hour].push(userName);
                    saveAndNotify(userName, hour, 'RESERVA');
                } else if (result.isDenied) {
                    const userName = result.value;
                    if (!list.includes(userName)) return Swal.fire('No estabas en esta clase');
                    
                    bookings[hour] = list.filter(name => name !== userName);
                    saveAndNotify(userName, hour, 'CANCELACIÓN');
                }
            });
        }

        function saveAndNotify(user, hour, type) {
            localStorage.setItem('H22_Bookings', JSON.stringify(bookings));
            renderSchedule();

            // Enviar WhatsApp al instructor
            const emoji = type === 'RESERVA' ? '✅' : '❌';
            const text = encodeURIComponent(`${emoji} *H22 GYM INFORMA*\n\nAcción: ${type}\nSocio: ${user}\nHorario: ${hour}\nFecha: ${new Date().toLocaleDateString()}`);
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${text}`);
        }
    </script>
</body>
</html>
