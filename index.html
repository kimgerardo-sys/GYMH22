<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H22 Admin Maestro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <header class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900/80 sticky top-0 z-50">
        <h1 class="text-xl font-bold text-blue-500">H22 <span class="text-white">ADMIN</span></h1>
        <button onclick="cargarDatos()" class="p-2 bg-slate-800 rounded-xl"><i data-lucide="refresh-cw" class="w-5 h-5"></i></button>
    </header>

    <main class="p-4 max-w-xl mx-auto space-y-6">
        <section class="glass p-6 rounded-3xl">
            <h2 class="text-xs font-bold mb-4 text-blue-400 uppercase tracking-widest">Inscribir Alumno</h2>
            <div class="grid grid-cols-1 gap-3">
                <input type="text" id="n" placeholder="Nombre completo" class="w-full bg-slate-800 p-3 rounded-xl outline-none">
                <input type="tel" id="w" placeholder="WhatsApp (521...)" class="w-full bg-slate-800 p-3 rounded-xl outline-none">
                <input type="date" id="f" class="w-full bg-slate-800 p-3 rounded-xl outline-none">
                <select id="h" class="w-full bg-slate-800 p-3 rounded-xl outline-none">
                    <option>05:00 AM</option><option>06:00 AM</option><option>07:00 AM</option>
                    <option>08:00 AM</option><option>04:00 PM</option><option>05:00 PM</option>
                </select>
                <button onclick="enviar()" class="bg-blue-600 p-3 rounded-xl font-bold">GUARDAR EN SHEETS</button>
            </div>
        </section>

        <div id="lista" class="space-y-3">
            <p class="text-center text-slate-500">Cargando alumnos...</p>
        </div>
    </main>

    <script>
        const URL = "https://script.google.com/macros/library/d/18dGXzXZWlz4EIJ1NOZK-kezft4FIQ_0i9mqxcKEvIusQGrSepEfMFY8E/5"; // <--- PEGA AQUÍ EL LINK DE IMPLEMENTACIÓN

        async function cargarDatos() {
            try {
                const r = await fetch(URL);
                const d = await r.json();
                const cont = document.getElementById('lista');
                cont.innerHTML = d.map(s => {
                    const diff = Math.ceil((new Date(s.vencimiento) - new Date()) / 86400000);
                    return `
                    <div class="glass p-4 rounded-2xl flex justify-between items-center">
                        <div>
                            <p class="font-bold">${s.nombre}</p>
                            <p class="text-[10px] text-slate-400">${s.horarioFijo} - Vence en ${diff} días</p>
                        </div>
                        <button onclick="cobrar('${s.nombre}','${s.whatsapp}')" class="bg-amber-500 text-black p-2 rounded-lg ${diff > 5 ? 'hidden' : ''}">
                            <i data-lucide="dollar-sign" class="w-4 h-4"></i>
                        </button>
                    </div>`;
                }).join('');
                lucide.createIcons();
            } catch (e) { document.getElementById('lista').innerHTML = "Error al cargar datos."; }
        }

        async function enviar() {
            const data = {
                accion: "inscribir",
                id: Date.now(),
                nombre: document.getElementById('n').value,
                whatsapp: document.getElementById('w').value,
                fecha: document.getElementById('f').value,
                horario: document.getElementById('h').value
            };

            Swal.fire('Guardando...');
            Swal.showLoading();

            // EL SECRETO: Usar 'fetch' con 'mode: no-cors' para que Google no bloquee
            await fetch(URL, {
                method: 'POST',
                mode: 'no-cors', 
                cache: 'no-cache',
                body: JSON.stringify(data)
            });

            Swal.fire('¡Listo!', 'Socio agregado (espera 5 seg para ver reflejado)', 'success');
            setTimeout(cargarDatos, 5000);
        }

        function cobrar(n, w) {
            const m = encodeURIComponent(`Hola ${n}, tu mensualidad de H22 vence pronto. Favor de transferir a: [TU CUENTA]`);
            window.open(`https://wa.me/${w}?text=${m}`);
        }

        window.onload = cargarDatos;
    </script>
</body>
</html>
