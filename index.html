<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H22 Studio Fitness</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app-container">
        <!-- HEADER -->
        <header>
            <div class="logo">
                <span class="highlight">H22</span> STUDIO
            </div>
            <button id="btn-logout" class="hidden">Salir</button>
        </header>

        <!-- PANTALLA DE LOGIN -->
        <main id="view-login" class="view active">
            <div class="glass-card login-card">
                <h2>Bienvenido a la Jungla</h2>
                <p>Ingresa tu número de celular para continuar</p>
                <div class="input-group">
                    <input type="tel" id="input-phone" placeholder="Ej. 5512345678" maxlength="15">
                </div>
                <button id="btn-login" class="btn-primary">Entrar</button>
                <p id="login-error" class="error-msg hidden">Número no encontrado.</p>
            </div>
        </main>

        <!-- PANTALLA DUEÑO (ADMIN) -->
        <main id="view-admin" class="view hidden">
            <h2 class="view-title">Panel de Control <span class="badge">ADMIN</span></h2>
            
            <section class="admin-actions">
                <button id="btn-show-add-user" class="btn-secondary">Inscribir Alumno</button>
                <button id="btn-show-broadcast" class="btn-secondary">Mensaje Difusión</button>
            </section>

            <section class="user-list-section">
                <h3>Alumnos y Próximos Pagos</h3>
                <div id="admin-users-container" class="users-grid">
                    <!-- Se llena con JS -->
                </div>
            </section>
        </main>

        <!-- PANTALLA USUARIO -->
        <main id="view-user" class="view hidden">
            <div class="user-greeting">
                <h2 id="user-name-display">Hola, Gorilla!</h2>
                <p>Tu fecha límite de pago es: <span id="user-payment-date" class="highlight">--</span></p>
            </div>

            <section class="classes-section">
                <h3>Tus Clases</h3>
                <div id="user-classes-container" class="classes-grid">
                    <!-- Se llena con JS -->
                </div>
                <button id="btn-schedule-extra" class="btn-secondary mt-1">Agendar Clase Extra</button>
            </section>

            <section class="promotions-section">
                <h3>Beneficios H22 Premium</h3>
                <div id="user-promos-container" class="promos-grid">
                    <!-- Se llena con JS -->
                </div>
            </section>
        </main>

        <!-- MODALS -->
        <!-- Inscribir alumno -->
        <div id="modal-add-user" class="modal hidden">
            <div class="modal-content glass-card">
                <h3>Nuevo Alumno</h3>
                <input type="text" id="new-user-name" placeholder="Nombre completo">
                <input type="tel" id="new-user-phone" placeholder="WhatsApp (Celular)">
                <input type="date" id="new-user-date" placeholder="Fecha Ingreso">
                <select id="new-user-schedule">
                    <option value="">Selecciona Horario Fijo</option>
                    <option value="L-V 5:00 AM">L-V 5:00 AM</option>
                    <option value="L-V 6:00 AM">L-V 6:00 AM</option>
                    <option value="L-V 7:00 AM">L-V 7:00 AM</option>
                    <option value="L-V 8:00 AM">L-V 8:00 AM</option>
                    <option value="L-V 9:00 AM">L-V 9:00 AM</option>
                    <option value="L-V 4:00 PM">L-V 4:00 PM</option>
                    <option value="L-V 5:00 PM">L-V 5:00 PM</option>
                    <option value="L-V 6:00 PM">L-V 6:00 PM</option>
                    <option value="L-V 7:00 PM">L-V 7:00 PM</option>
                    <option value="L-V 8:00 PM">L-V 8:00 PM</option>
                </select>
                <div class="modal-buttons">
                    <button id="btn-save-user" class="btn-primary">Guardar</button>
                    <button class="btn-cancel btn-close-modal">Cancelar</button>
                </div>
            </div>
        </div>

        <!-- Agendar Extra -->
        <div id="modal-schedule" class="modal hidden">
            <div class="modal-content glass-card">
                <h3>Agendar Clase Extra</h3>
                <div id="available-classes-container">
                    <!-- JS llenara las opciones -->
                </div>
                <div class="modal-buttons">
                    <button class="btn-cancel btn-close-modal mt-1">Cerrar</button>
                </div>
            </div>
        </div>

    </div>

    <!-- Spinner / Loader -->
    <div id="loader" class="loader-overlay hidden">
        <div class="spinner"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
