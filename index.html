<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H22 Admin - Control Total</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen pb-10">

    <header class="p-6 border-b border-slate-800 flex justify-between items-center sticky top-0 bg-slate-900/80 backdrop-blur-md z-50">
        <div>
            <h1 class="text-xl font-bold text-blue-500 tracking-tight">H22 <span class="text-white">STUDIO ADMIN</span></h1>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Gestión de Entrenamiento</p>
        </div>
        <button onclick="cargarBaseDeDatos()" class="p-2 bg-slate-800 rounded-xl hover:bg-slate-700 transition-colors">
            <i data-lucide="refresh-cw" class="w-5 h-5 text-blue-400"></i>
        </button>
    </header>

    <main class="p-4 max-w-2xl mx-auto space-y-6">
        
        <section class="glass-card p-6 rounded-3xl">
            <h2 class="text-sm font-bold mb-4 flex items-center gap-2 text-blue-400 uppercase tracking-wider">
                <i data-lucide="user-plus" class="w-4 h-4"></i> Inscribir Nuevo Alumno
            </h2>
            <div class="space-y-3">
                <input type="text" id="reg-nombre" placeholder="Nombre completo" class="w-full bg-slate-800/50 border border-slate-700 p-3 rounded-xl outline-none focus:border-blue-500">
                <input type="tel" id="reg-wa" placeholder="WhatsApp (Ej: 5216621286485)" class="w-full bg-slate-800/50 border border-slate-700 p-3 rounded-xl outline-none focus:border-blue-500">
                <div class="grid grid-cols-2 gap-3">
                    <input type="date" id="reg-fecha" class="bg-slate-800/50 border border-slate-700 p-3 rounded-xl outline-none text-slate-400 text-sm">
                    <select id="reg-hora" class="bg-slate-800/50 border border-slate-700 p-3 rounded-xl outline-none text-sm text-slate-400">
                        <option value="">Horario Fijo</option>
                        <option>05:00 AM</option><option>06:00 AM</option><option>07:00 AM</option>
                        <option>08:00 AM</option><option>09:00 AM</option><option>04:00 PM</option>
                        <option>05:00 PM</option><option>06:00 PM</option><option>07:00 PM</option>
                    </select>
                </div>
                <button onclick="guardarSocio()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-blue-900/20">
                    GUARDAR EN GOOGLE SHEETS
                </button>
            </div>
        </section>

        <section class="glass-card p-6 rounded-3xl border-l-4 border-l-amber-500">
            <h2 class="text-sm font-bold mb-2 flex items-center gap-2 text-amber-400 uppercase tracking-wider">
                <i data-lucide="megaphone" class="w-4 h-4"></i> Avisos Generales
            </h2>
            <textarea id="msg-masivo" placeholder="Escribe un aviso para todos los alumnos..." class="w-full bg-slate-800/50 border border-slate-700 p-3 rounded-xl text-sm mb-3 outline-none min-h-[80px]"></textarea>
            <button onclick="enviarAvisoGeneral()" class="text-xs bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg font-bold transition-colors">
                DIFUNDIR AVISO (WA)
            </button>
        </section>

        <section class="space-y-4">
            <div class="flex justify-between items-center px-2">
                <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider">Lista de Socios Activos</h2>
                <span id="contador-socios" class="text-xs bg-blue-600/20 text-blue-400 px-2 py-1 rounded-md font-bold">0</span>
            </div>
            
            <div id="contenedor-socios" class="space-y-3">
                <div class="text-center py-10 text-slate-600">
                    <p class="text-sm">Conectando con la base de datos...</p>
                </div>
            </div>
        </section>

    </main>

    <script>
        // CONFIGURACIÓN INTEGRADA
        const SCRIPT_URL = "https://script.google.com/macros/library/d/18dGXzXZWlz4EIJ1NOZK-kezft4FIQ_0i9mqxcKEvIusQGrSepEfMFY8E/4";
        const DATOS_BANCO = "\n📍 *Datos de Pago:*\nBanco: [TU BANCO]\nCuenta: [TU CUENTA]\nCLABE: [TU CLABE]\nDueño: H22 Studio";

        async function cargarBaseDeDatos() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                const container = document.getElementById('contenedor-socios');
                document.getElementById('contador-socios').innerText = data.length;
                container.innerHTML = "";

                data.forEach(socio => {
                    const hoy = new Date();
                    const vence = new Date(socio.vencimiento);
                    const diffDays = Math.ceil((vence - hoy) / (1000 * 60 * 60 * 24));
                    
                    let colorStatus = "text-emerald-400 bg-emerald-400/10 border-emerald-400/20";
                    let botonCobro = "";

                    if(diffDays <= 5) {
                        colorStatus = "text-amber-400 bg-amber-400/10 border-amber-400/20";
                        botonCobro = `<button onclick="cobrar('${socio.nombre}', '${socio.whatsapp}')" class="p-2 bg-amber-500 text-slate-900 rounded-lg shadow-lg shadow-amber-500/20"><i data-lucide="dollar-sign" class="w-4 h-4"></i></button>`;
                    }
                    if(diffDays <= 0) colorStatus = "text-red-400 bg-red-400/10 border-red-400/20";

                    container.innerHTML += `
                        <div class="glass-card p-4 rounded-2xl flex justify-between items-center transition-all hover:border-slate-600">
                            <div class="space-y-1">
                                <h3 class="font-bold text-white text-sm">${socio.nombre}</h3>
                                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest italic">${socio.horarioFijo}</p>
